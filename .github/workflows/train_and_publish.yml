name: Train and Publish Models

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  train-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download NSL-KDD dataset
        run: |
          mkdir -p data
          wget -q "https://raw.githubusercontent.com/jmnwong/NSL-KDD-Dataset/master/KDDTrain%2B.txt" -O data/KDDTrain+.txt
          wget -q "https://raw.githubusercontent.com/jmnwong/NSL-KDD-Dataset/master/KDDTest%2B.txt" -O data/KDDTest+.txt
          echo "Dataset downloaded:"
          wc -l data/KDDTrain+.txt data/KDDTest+.txt

      - name: Preprocess data
        run: python src/preprocess.py

      - name: Train models
        run: python src/train.py

      - name: Evaluate models
        run: python src/evaluate.py | tee eval_results.txt

      - name: Export to ONNX
        run: python src/export.py

      - name: Validate ONNX latency
        run: python src/validate_onnx.py | tee latency_results.txt

      - name: Save ONNX models as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: onnx-models-v${{ github.run_number }}
          path: |
            models/isolation_forest.onnx
            models/sgd_classifier.onnx
          retention-days: 30

      - name: Write release notes
        run: |
          cat > release_notes.md << 'NOTES'
          ## Model Release v${{ github.run_number }}

          ### Dataset
          NSL-KDD — 125,973 train / 22,544 test samples

          ### Usage in ci-cd-ai
          wget https://github.com/${{ github.repository }}/releases/latest/download/isolation_forest.onnx
          wget https://github.com/${{ github.repository }}/releases/latest/download/sgd_classifier.onnx
          NOTES

          echo "" >> release_notes.md
          echo "### Evaluation Results" >> release_notes.md
          echo '```' >> release_notes.md
          cat eval_results.txt >> release_notes.md
          echo '```' >> release_notes.md
          echo "" >> release_notes.md
          echo "### Inference Latency" >> release_notes.md
          echo '```' >> release_notes.md
          cat latency_results.txt >> release_notes.md
          echo '```' >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Model Release v${{ github.run_number }}"
          body_path: release_notes.md
          files: |
            models/isolation_forest.onnx
            models/sgd_classifier.onnx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}